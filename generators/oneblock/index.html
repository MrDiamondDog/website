<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>One Block Command Generator</title>
        <link rel="stylesheet" href="/css/styles.css" />
        <link rel="stylesheet" href="/css/generator.css" />
    </head>
    <body>
        <script src="/dist/navbar.js"></script>
        <br />
        <br />
        <h1>One Block Command Generator</h1>
        <h3>A command generator for Minecraft 1.20 where you can combine many commands into one.</h3>
        <div class="content">
            <!-- <div class="divider"></div>
            <h2>Sign</h2>
            <h3>This sign, when right clicked, will remove the entire structure for quick cleanup.</h3>
            <label>Include Sign</label>
            <select id="include-sign">
                <option value="true">Yes</option>
                <option value="false">No</option>
            </select>
            <div class="divider"></div> -->
            <h2>Colors</h2>
            <label>Bottom & Top Color</label>
            <select id="bottom-top-color">
                <option value="red">Red</option>
                <option value="orange">Orange</option>
                <option value="yellow">Yellow</option>
                <option value="lime">Lime</option>
                <option value="green">Green</option>
                <option value="light_blue">Light Blue</option>
                <option value="cyan">Cyan</option>
                <option value="blue">Blue</option>
                <option value="purple">Purple</option>
                <option value="magenta">Magenta</option>
                <option value="pink">Pink</option>
                <option value="brown">Brown</option>
                <option value="gray">Gray</option>
                <option value="light_gray">Light Gray</option>
                <option value="black">Black</option>
                <option value="white">White</option>
            </select>

            <label>Glass Color</label>
            <select id="glass-color">
                <option value="red">Red</option>
                <option value="orange">Orange</option>
                <option value="yellow">Yellow</option>
                <option value="lime">Lime</option>
                <option value="green">Green</option>
                <option value="light_blue">Light Blue</option>
                <option value="cyan">Cyan</option>
                <option value="blue">Blue</option>
                <option value="purple">Purple</option>
                <option value="magenta">Magenta</option>
                <option value="pink">Pink</option>
                <option value="brown">Brown</option>
                <option value="gray">Gray</option>
                <option value="light_gray">Light Gray</option>
                <option value="black">Black</option>
                <option value="white">White</option>
            </select>

            <div class="divider"></div>
            <h2>Commands</h2>

            <div id="command-container"></div>
            <button id="add-row">Add Row</button>

            <div class="divider"></div>
            <button id="generate">Generate</button>
            <textarea id="output"></textarea>
        </div>

        <script src="/dist/oneblockGenerator.js"></script>
    </body>
</html>
