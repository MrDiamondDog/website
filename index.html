<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>MrDiamond</title>
        <link rel="stylesheet" href="css/styles.css" />
        <link rel="stylesheet" href="css/home.css" />
        <link
            rel="stylesheet"
            href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@48,700,0,0"
        />
    </head>
    <body>
        <div class="background"></div>
        <script src="dist/navbar.js"></script>
        <h1 class="welcome" id="welcome">
            <span id="welcome-text">Welcome</span>
        </h1>
        <div class="content">
            <div class="col">
                <h2 class="subtitle">Generators</h2>
                <div class="project" data-url="./generators/oneblock/">
                    <span class="material-symbols-outlined icon">handyman</span>
                    <h3 class="title">One Block Command</h3>
                    <p class="description">Put all of your Minecraft commands into one!</p>
                </div>
                <div class="project" data-url="./generators/discordjs-embed/">
                    <span class="material-symbols-outlined icon">monitor</span>
                    <h3 class="title">Discord.js Embed Builder</h3>
                    <p class="description">A simple embed builder for Discord.js</p>
                </div>
            </div>
            <div class="col">
                <h2 class="subtitle">Games</h2>
                <div class="project" data-url="./games/logic-gate">
                    <span class="material-symbols-outlined icon">cable</span>
                    <h3 class="title">Logic Gate Simulator</h3>
                    <p class="description">
                        An experimental project where you mess with logic gates.
                    </p>
                </div>
            </div>
        </div>

        <script src="/dist/footer.js"></script>
        <script src="dist/home.js"></script>
    </body>
</html>
